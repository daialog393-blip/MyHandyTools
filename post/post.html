<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>郵便番号検索デモ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 400px; margin: 0 auto; }
        input { padding: 8px; width: 100px; margin-bottom: 10px; }
        button { padding: 8px 15px; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; min-height: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h2>住所検索 APIデモ</h2>
    <p>郵便番号を入力してください（ハイフンなし）</p>
    <input type="text" id="zipcode" placeholder="例: 6500011" maxlength="7">
    <button onclick="searchAddress()">検索実行</button>

    <div id="result">ここに結果が表示されます</div>
</div>

<script>
async function searchAddress() {
    const zipcode = document.getElementById('zipcode').value;
    const resultDiv = document.getElementById('result');

    // バリデーション（7桁かチェック）
    if (zipcode.length !== 7) {
        resultDiv.innerHTML = "郵便番号は7桁で入力してください。";
        return;
    }

    resultDiv.innerHTML = "検索中...";

    try {
        // APIを呼び出し（Fetch APIを使用）
        const response = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${zipcode}`);
        const data = await response.json();

        if (data.results) {
            const res = data.results[0];
            // 取得した住所を表示
            resultDiv.innerHTML = `
                <strong>【検索結果】</strong><br>
                都道府県：${res.address1} (${res.kana1})<br>
                市区町村：${res.address2}${res.address3} <br>
                (${res.kana2}${res.kana3})
            `;
        } else {
            resultDiv.innerHTML = "該当する住所が見つかりませんでした。";
        }
    } catch (error) {
        resultDiv.innerHTML = "エラーが発生しました。通信状況を確認してください。";
        console.error(error);
    }
}
</script>

</body>
</html>
